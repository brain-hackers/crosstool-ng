---
name: Release Toolchains

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-ctng:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - branch: "1.28.0"
          - branch: "1.22.0"
    steps:
      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex gperf help2man libtool-bin \
            meson ninja-build texinfo autoconf automake libncurses-dev

      - name: Build ct-ng ${{ matrix.branch }}
        run: |
          ./bootstrap
          ./configure --enable-local
          make -j$(nproc)
          ./ct-ng version

      - name: Package ct-ng ${{ matrix.branch }}
        run: |
          tar -cf ctng-${{ matrix.branch }}.tar \
            --exclude='.build' \
            --exclude='.git' \
            .

      - name: Upload ct-ng ${{ matrix.branch }}
        uses: actions/upload-artifact@v4
        with:
          name: ctng-${{ matrix.branch }}
          path: ctng-${{ matrix.branch }}.tar
          retention-days: 1

  download-sources:
    needs: build-ctng
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - branch: "1.28.0"
            samples: >-
              arm-unknown-linux-gnueabi-u2404
              arm-unknown-linux-gnueabihf-u2404
              arm-none-eabi-u2404
              arm-unknown-linux-gnueabi-u2204
              arm-unknown-linux-gnueabihf-u2204
              arm-none-eabi-u2204
              arm-unknown-linux-gnueabi-u2004
              arm-unknown-linux-gnueabihf-u2004
              arm-none-eabi-u2004
              arm-unknown-linux-gnueabi-u1804
              arm-unknown-linux-gnueabihf-u1804
              arm-none-eabi-u1804
              arm-unknown-linux-gnueabi-u1604
              arm-unknown-linux-gnueabihf-u1604
              arm-none-eabi-u1604
          - branch: "1.22.0"
            samples: >-
              arm-unknown-linux-gnueabi-u1404
              arm-unknown-linux-gnueabihf-u1404
              arm-none-eabi-u1404
    steps:
      - name: Download ct-ng ${{ matrix.branch }}
        uses: actions/download-artifact@v4
        with:
          name: ctng-${{ matrix.branch }}

      - name: Extract ct-ng
        run: |
          tar -xf ctng-${{ matrix.branch }}.tar

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex gperf help2man libtool-bin texinfo

      - name: Download sources for ${{ matrix.branch }}
        run: |
          mkdir -p src
          for sample in ${{ matrix.samples }}; do
            ./ct-ng ${sample}
            sed -i -e '/CT_LOCAL_TARBALLS_DIR/s/HOME/CT_TOP_DIR/' .config
            ./ct-ng source
          done

      - name: Package sources
        run: |
          tar -cf src-${{ matrix.branch }}.tar src/

      - name: Upload sources ${{ matrix.branch }}
        uses: actions/upload-artifact@v4
        with:
          name: src-${{ matrix.branch }}
          path: src-${{ matrix.branch }}.tar
          retention-days: 1

  build-toolchains:
    needs: [build-ctng, download-sources]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1.28.0 — Ubuntu 24.04
          - {sample: "arm-unknown-linux-gnueabi-u2404", branch: "1.28.0"}
          - {sample: "arm-unknown-linux-gnueabihf-u2404", branch: "1.28.0"}
          - {sample: "arm-none-eabi-u2404", branch: "1.28.0"}
          # 1.28.0 — Ubuntu 22.04
          - {sample: "arm-unknown-linux-gnueabi-u2204", branch: "1.28.0"}
          - {sample: "arm-unknown-linux-gnueabihf-u2204", branch: "1.28.0"}
          - {sample: "arm-none-eabi-u2204", branch: "1.28.0"}
          # 1.28.0 — Ubuntu 20.04
          - {sample: "arm-unknown-linux-gnueabi-u2004", branch: "1.28.0"}
          - {sample: "arm-unknown-linux-gnueabihf-u2004", branch: "1.28.0"}
          - {sample: "arm-none-eabi-u2004", branch: "1.28.0"}
          # 1.28.0 — Ubuntu 18.04
          - {sample: "arm-unknown-linux-gnueabi-u1804", branch: "1.28.0"}
          - {sample: "arm-unknown-linux-gnueabihf-u1804", branch: "1.28.0"}
          - {sample: "arm-none-eabi-u1804", branch: "1.28.0"}
          # 1.28.0 — Ubuntu 16.04
          - {sample: "arm-unknown-linux-gnueabi-u1604", branch: "1.28.0"}
          - {sample: "arm-unknown-linux-gnueabihf-u1604", branch: "1.28.0"}
          - {sample: "arm-none-eabi-u1604", branch: "1.28.0"}
          # 1.22.0 — Ubuntu 14.04
          - {sample: "arm-unknown-linux-gnueabi-u1404", branch: "1.22.0"}
          - {sample: "arm-unknown-linux-gnueabihf-u1404", branch: "1.22.0"}
          - {sample: "arm-none-eabi-u1404", branch: "1.22.0"}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Download ct-ng ${{ matrix.branch }}
        uses: actions/download-artifact@v4
        with:
          name: ctng-${{ matrix.branch }}

      - name: Extract ct-ng
        run: |
          tar -xf ctng-${{ matrix.branch }}.tar

      - name: Download sources ${{ matrix.branch }}
        uses: actions/download-artifact@v4
        with:
          name: src-${{ matrix.branch }}

      - name: Extract sources
        run: |
          tar -xf src-${{ matrix.branch }}.tar

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex gperf help2man libtool-bin \
            meson ninja-build texinfo

      - name: Build ${{ matrix.sample }}
        env:
          CT_PREFIX: /opt/x-tools
        run: |
          ./ct-ng ${{ matrix.sample }}
          sed -i -e '/CT_LOCAL_TARBALLS_DIR/s/HOME/CT_TOP_DIR/' .config
          sed -i -e 's|^CT_PREFIX_DIR=.*|CT_PREFIX_DIR="/opt/x-tools/${CT_TARGET}"|' .config
          sed -i -e '/CT_LOG_PROGRESS_BAR/s/y$/n/' .config
          ./ct-ng build

      - name: Package ${{ matrix.sample }}
        run: |
          cd /opt/x-tools
          # Find the actual toolchain directory
          TOOLCHAIN_DIR=$(ls -d */ | head -1)
          tar -cJf "${GITHUB_WORKSPACE}/x-tools-${{ matrix.sample }}.tar.xz" \
            -C /opt/x-tools "${TOOLCHAIN_DIR}"

      - name: Upload ${{ matrix.sample }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: x-tools-${{ matrix.sample }}
          path: x-tools-${{ matrix.sample }}.tar.xz
          retention-days: 1

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.sample }}
          path: |
            build.log
            .config
        if: ${{ always() }}

  release:
    needs: build-toolchains
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all toolchain artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: x-tools-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh *.tar.xz

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "Toolchain Release ${TAG}" \
            --notes "Pre-built ARM cross-compilation toolchains for Ubuntu LTS versions.

          ## Included toolchains

          Each archive contains a complete GCC cross-compilation toolchain.
          Extract to \`/opt/x-tools/\` or any directory of your choice.

          ### Targets
          - \`arm-unknown-linux-gnueabi\` — ARM Linux soft-float
          - \`arm-unknown-linux-gnueabihf\` — ARM Linux hard-float
          - \`arm-none-eabi\` — ARM bare-metal (multilib)

          ### Ubuntu versions
          - u2404: GCC 13, glibc 2.39, binutils 2.42
          - u2204: GCC 11, glibc 2.35, binutils 2.38
          - u2004: GCC 9, glibc 2.31, binutils 2.34
          - u1804: GCC 7, glibc 2.27, binutils 2.30
          - u1604: GCC 5, glibc 2.23, binutils 2.26
          - u1404: GCC 4.8, glibc 2.19, binutils 2.24

          Built with \`CT_STATIC_TOOLCHAIN=y\` for portability.
          Install prefix: \`/opt/x-tools/\`" \
            *.tar.xz
